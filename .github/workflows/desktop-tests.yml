name: Desktop tests

on:
  push:
    branches: [github_actions]
  workflow_dispatch:

env:
  CI: true

jobs:
  desktop-tests:
    strategy:
      fail-fast: false
      matrix:
        browser: [safari, chrome]
    runs-on: macos-latest
    defaults:
      run:
        working-directory: scripts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install mkcert
        run: |
          brew install mkcert
          mkcert -install

      - name: Install browser
        run: node desktop-install ${{ matrix.browser }}

      - name: Start DNS monitor
        run: sudo node monitor-dns.js &

      - name: Run tests
        run: node test --browser=${{ matrix.browser }} --out=../${{ matrix.browser }}.json
        timeout-minutes: 90

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.browser }}-results
          path: |
            ${{ matrix.browser }}.json
            ${{ matrix.browser }}.html
            ${{ matrix.browser }}-preview.png
          if-no-files-found: warn
