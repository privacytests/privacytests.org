name: Desktop tests

on:
  push:
    branches: [github_actions]
  workflow_dispatch:
    cron: '0 3 * * *'

env:
  CI: true
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  desktop-tests:
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox] #[brave, chrome, duckduckgo, edge, firefox, librewolf, mullvad, opera, safari, tor, ungoogled, vivaldi]
        repetitions: [1, 2, 3, 4, 5]
    runs-on: macos-latest
    defaults:
      run:
        working-directory: scripts

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install mkcert
        run: |
          # macos-latest images ship with aws/tap pre-tapped but untrusted; brew warns on every command until trusted.
          brew trust aws/tap
          brew install mkcert
          mkcert -install

      - name: Install browser
        run: node desktop-install ${{ matrix.browser }}

      - name: Start DNS monitor
        run: sudo node monitor-dns.js &

      - name: Run tests
        run: node test --browser=${{ matrix.browser }} --out=../${{ matrix.browser }}.json
        timeout-minutes: 90

      - name: Upload results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ${{ matrix.browser }}-results
          path: |
            ${{ matrix.browser }}.json
            ${{ matrix.browser }}.html
            ${{ matrix.browser }}-preview.png
          if-no-files-found: warn
